services:
  postgres:
    image: postgres:16-alpine
    container_name: ke-engine-postgres
    environment:
      POSTGRES_DB: ke_engine
      POSTGRES_USER: ke_engine
      POSTGRES_PASSWORD: ke_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ke-engine-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: ke-engine-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  elasticsearch:
    image: elastic/elasticsearch:8.15.3
    container_name: ke-engine-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  neo4j:
    image: neo4j:5-community
    container_name: ke-engine-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

volumes:
  postgres-data:
  minio-data:
  elasticsearch-data:
  neo4j-data:
